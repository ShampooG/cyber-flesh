<script>

function switchRecordTab(tab) {
    document.getElementById('tab-ai').classList.remove('active');
    document.getElementById('tab-manual').classList.remove('active');
    document.getElementById('panel-ai').classList.remove('active');
    document.getElementById('panel-manual').classList.remove('active');
    
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
}

function updateManualPresets() {
    const selected = document.querySelector('input[name="man-attr"]:checked').value;
    document.getElementById('in-intensity-manual').innerHTML = getPresetsHtml(selected);
    document.getElementById('unit-manual').innerText = selected === 'WIL' ? '数值' : '分钟';
    
    document.querySelectorAll('.manual-attr-select label').forEach(lbl => lbl.classList.remove('active'));
    document.getElementById('lbl-man-' + selected.toLowerCase()).classList.add('active');
}

function openManualInput(attr) {
    switchRecordTab('manual');
    document.querySelector(`input[name="man-attr"][value="${attr}"]`).checked = true;
    updateManualPresets();
    document.getElementById('in-duration-manual').focus();
}

function commitGlobalManual() {
    const attr = document.querySelector('input[name="man-attr"]:checked').value;
    const durVal = document.getElementById('in-duration-manual').value;
    const duration = parseFloat(durVal) || 0;
    let intensity = parseFloat(document.getElementById('in-intensity-manual').value) || 1.0;
    
    if (duration <= 0) { alert('请输入有效数值'); return; }
    if (document.getElementById('chk-memory-tax').checked) intensity *= 0.7;

    const actionTime = window.selectedHeatmapDate || Date.now();
    let finalXp = Math.round(duration * intensity * DB.current_buff);
    let tags = [];
    
    if (DB.current_debuffs && DB.current_debuffs.includes('BRAIN_FOG') && attr === 'FOC') {
        finalXp = Math.round(finalXp * 0.90); tags.push('[脑雾 -10%]');
    }
    if (DB.current_debuffs && DB.current_debuffs.includes('MUSCLE_FATIGUE') && attr === 'STR') {
        finalXp = Math.round(finalXp * 0.90); tags.push('[疲劳 -10%]');
    }
    const tagStr = tags.length > 0 ? ' ' + tags.join(' ') : '';
    
    DB.attributes[attr].total_xp += finalXp;
    DB.attributes[attr].last_update = Date.now();
    addActionLog('XP', [attr], finalXp, `[MANUAL] 录入${tagStr}`, actionTime);
    logOracle(`> ${attr} 手动注入 +${finalXp}XP${tagStr}`, 'positive');
    
    document.getElementById('in-duration-manual').value = '';
    document.getElementById('chk-memory-tax').checked = false;
    saveData();
    renderRadar();
    renderHeatmap();
    updateManualPresets();
}

// ===== 核心配置矩阵 =====

let DB = null;

// ===== 生物学基线校准算法 =====
function calcBaselineLevel(attr, age, sex, habits) {
    // 1. 峰值年龄设定
    const peaks = { STR: 27, CON: 25, FOC: 30, WIL: 55 };
    const peak = peaks[attr];
    
    // 2. 年龄曲线因子 (0~1.0)
    let ageFactor = 1.0;
    if (age < peak) {
        if (attr === 'WIL') {
            ageFactor = 1.0 - ((peak - age) * 0.002); // 每年成长 +0.2%
        } else {
            ageFactor = 0.3 + 0.7 * ((age - 12) / (peak - 12)); // 发育期
        }
    } else {
        const yearsPast = age - peak;
        if (attr === 'STR') {
            if (age <= 50) ageFactor = 1.0 - (yearsPast * 0.005);
            else ageFactor = 1.0 - ((50 - 27) * 0.005) - ((age - 50) * 0.030);
        } else if (attr === 'CON') {
            const declineRate = habits.includes('cardio') ? 0.005 : 0.010;
            ageFactor = 1.0 - (yearsPast * declineRate);
        } else if (attr === 'FOC') {
            ageFactor = 1.0 - (yearsPast * 0.003);
        } else if (attr === 'WIL') {
            ageFactor = 1.0; 
        }
    }
    ageFactor = Math.max(0.1, Math.min(1.0, ageFactor));

    // 3. 习惯积分系统 (Habit Profiling)
    let lifeMult = 0.6; // 基础系数起步
    
    if (attr === 'STR' || attr === 'CON') {
        if (habits.includes('sedentary')) lifeMult -= 0.15;
        if (habits.includes('pro')) lifeMult += 0.4;
        
        if (attr === 'STR' && habits.includes('resistance')) lifeMult += 0.25;
        if (attr === 'CON' && habits.includes('cardio')) lifeMult += 0.25;
    } else if (attr === 'FOC') {
        if (habits.includes('doomscroll')) lifeMult -= 0.15;
        if (habits.includes('deepwork')) lifeMult += 0.3;
    } else if (attr === 'WIL') {
        if (habits.includes('doomscroll')) lifeMult -= 0.1;
        if (habits.includes('meditation')) lifeMult += 0.3;
        if (habits.includes('resistance') || habits.includes('cardio')) lifeMult += 0.1; 
    }
    
    lifeMult = Math.max(0.1, Math.min(1.0, lifeMult));

    // 4. 性别修正
    let sexMult = 1.0;
    if (sex === 'F') {
        if (attr === 'STR') sexMult = 0.60;
        else if (attr === 'CON') sexMult = 0.80;
        else if (attr === 'FOC') sexMult = 1.00;
        else if (attr === 'WIL') sexMult = 1.00;
    }

    // 5. 理论天花板等级为 22
    const maxLevel = 22;
    let finalLevel = Math.round(maxLevel * ageFactor * lifeMult * sexMult);
    
    // 6. 特殊历史记忆加成
    if (habits.includes('muscle_mem') && (attr === 'STR' || attr === 'CON')) finalLevel += 5;
    if (habits.includes('cog_elite') && (attr === 'FOC')) finalLevel += 5;
    
    return Math.max(1, finalLevel);
}

// 经验反推公式：根据 Level 获取初始 XP
function getBaseXpForLevel(level) {
    if (level <= 1) return 0;
    return 100 * Math.pow(level - 1, 1.5);
}

// XP -> Level 对象
function calcLevelObj(total_xp) {
    if (total_xp < 0) total_xp = 0;
    const level = Math.floor(Math.pow(total_xp / 100, 2 / 3)) + 1;
    const curr_base = 100 * Math.pow(level - 1, 1.5);
    const next_base = 100 * Math.pow(level, 1.5);
    const xp_in = total_xp - curr_base;
    const xp_need = next_base - curr_base;
    return { level, progress: xp_in / xp_need, total_xp, xp_into_level: Math.floor(xp_in), xp_needed: Math.floor(xp_need) };
}

    if (!DB.profile) {

}

function bootUI() {
    window.calendarMonthOffset = 0;
    renderHeatmap();
    renderRadar();
    renderVitalsUI();
    setupEventListeners();
}

let currentCalDate = new Date();
function changeMonth(dir) {
    currentCalDate.setMonth(currentCalDate.getMonth() + dir);
    renderHeatmap();
}

// ===== 持久化 =====
function saveData() {
    try {
        const raw = JSON.stringify(DB);
        const encoded = btoa(unescape(encodeURIComponent(raw)));
        localStorage.setItem(STORAGE_KEY, encoded);
    } catch(e) { logOracle('ERR: 保存失败', 'negative'); }
    renderRadar();
}

function loadData() {
    const rawV5 = localStorage.getItem(STORAGE_KEY);
    if (rawV5) {
        try { DB = JSON.parse(decodeURIComponent(escape(atob(rawV5)))); } 
        catch(e) { DB = createFreshDB(); }
    } else {
        // 向后兼容 V4 (数据结构一致，直接继承)
        const rawV4 = localStorage.getItem('flesh_data_v4');
        if (rawV4) {
            try { 
                DB = JSON.parse(decodeURIComponent(escape(atob(rawV4)))); 
                logOracle('> 已从 V4 迁移数据。', 'system');
            } catch(e) { DB = createFreshDB(); }
        } else {
            DB = createFreshDB();
        }
    }
    
    if (!DB.settings) DB.settings = { ...DEFAULT_SETTINGS };
    if (!DB.action_log) DB.action_log = [];
    if (!DB.vitals_ema) DB.vitals_ema = { sleep_ema: null, hrv_ema: null, rhr_ema: null, count: 0 };
    if (DB.current_hp === undefined) DB.current_hp = 100;
}

// ===== Calibration UI 逻辑 =====
function showCalibration() {
    const overlay = document.getElementById('calib-overlay');
    overlay.style.display = 'flex';

    const getHabits = () => {
        return Array.from(document.querySelectorAll('#calib-body input:checked, #calib-mind input:checked')).map(el => el.value);
    };

    const updatePreview = () => {
        const age = parseInt(document.getElementById('calib-age').value) || 25;
        const sex = document.getElementById('calib-sex').value;
        const habits = getHabits();

        ['STR', 'CON', 'FOC', 'WIL'].forEach(attr => {
            const lv = calcBaselineLevel(attr, age, sex, habits);
            document.getElementById(`preview-${attr.toLowerCase()}`).innerText = `${attr} LV.${lv.toString().padStart(2, '0')}`;
        });
    };

    document.getElementById('calib-age').addEventListener('input', updatePreview);
    document.getElementById('calib-sex').addEventListener('change', updatePreview);
    document.querySelectorAll('#calib-body input, #calib-mind input').forEach(el => el.addEventListener('change', updatePreview));

    document.getElementById('btn-finish-calib').addEventListener('click', () => {
        const age = parseInt(document.getElementById('calib-age').value) || 25;
        const sex = document.getElementById('calib-sex').value;
        const habits = getHabits();

        DB.profile = { age, sex, habits, createdAt: Date.now() };
        
        // 注入初始经验
        ['STR', 'CON', 'FOC', 'WIL'].forEach(attr => {
            const lv = calcBaselineLevel(attr, age, sex, habits);
            DB.attributes[attr].total_xp = getBaseXpForLevel(lv);
            DB.attributes[attr].last_update = Date.now();
        });

        overlay.style.display = 'none';
        saveData();
        bootUI();
        logOracle(`> 坐标确立。物理引擎 V5.1 已绑定至 [${age}岁|${sex}|Habits:${habits.length}]。`, 'system');
        window.location.reload(); // 强制刷新界面清理残余DOM状态
    });

    updatePreview();
}

// ===== 衰减：突触固化定律 =====
function getActualDecayRate(attr, level) {
    const base = ATTR_CONFIG[attr].base_decay;
    return base / Math.sqrt(level);
}

function calculateDecay() {
    const todayStr = new Date().toDateString();
    if (DB.last_login_date === todayStr) return;

    const msPerDay = 86400000;
    const todayMid = getMidnight(new Date());
    const lastLoginMid = getMidnight(new Date(DB.last_login_date));

    let cursor = lastLoginMid + msPerDay;
    let decayLog = [];

    while (cursor <= todayMid) {
        Object.keys(ATTR_CONFIG).forEach(key => {
            const conf = ATTR_CONFIG[key];
            const attr = DB.attributes[key];
            const daysSince = Math.floor((cursor - getMidnight(new Date(attr.last_update))) / msPerDay);

            if (daysSince > conf.safe_days && attr.total_xp > 0) {
                const currentLevel = calcLevelObj(attr.total_xp).level;
                const actualRate = getActualDecayRate(key, currentLevel);
                const lost = attr.total_xp * actualRate;
                attr.total_xp -= lost;
                
                const existing = decayLog.find(l => l.key === key);
                if (existing) { existing.lost += lost; existing.days++; }
                else { decayLog.push({key, lost, days:1}); }
            }
        });
        cursor += msPerDay;
    }

    decayLog.forEach(d => {
        logOracle(`> [${d.key}] 离线${d.days}天，肌肉记忆衰减 -${Math.floor(d.lost)} XP`, 'negative');
    });

    DB.last_login_date = todayStr;
    saveData();
}

// ===== Vitals =====
function syncVitals() {
    const th = parseInt(document.getElementById('slp-t-h').value) || 0;
    const tm = parseInt(document.getElementById('slp-t-m').value) || 0;
    const dh = parseInt(document.getElementById('slp-d-h').value) || 0;
    const dm = parseInt(document.getElementById('slp-d-m').value) || 0;
    const rh = parseInt(document.getElementById('slp-r-h').value) || 0;
    const rm = parseInt(document.getElementById('slp-r-m').value) || 0;
    
    const totalMins = th * 60 + tm;
    const deepMins = dh * 60 + dm;
    const remMins = rh * 60 + rm;

    const hrv = parseFloat(document.getElementById('in-hrv').value);
    const rhr = parseFloat(document.getElementById('in-rhr').value);

    if (totalMins <= 0 || isNaN(hrv) || isNaN(rhr) || hrv <= 0 || rhr <= 0) {
        alert('请输入有效的睡眠时长、HRV 和 RHR 数值！');
        logOracle('ERR: 生理数值无效。', 'negative'); return;
    }

    const alpha = 2 / 15;
    if (DB.vitals_ema.hrv_ema === null) {
        DB.vitals_ema.hrv_ema = hrv; DB.vitals_ema.rhr_ema = rhr;
        logOracle('> EMA 基线初始化。', 'system');
    } else {
        DB.vitals_ema.hrv_ema = hrv * alpha + DB.vitals_ema.hrv_ema * (1 - alpha);
        DB.vitals_ema.rhr_ema = rhr * alpha + DB.vitals_ema.rhr_ema * (1 - alpha);
    }

    const hrvDiff = (hrv - DB.vitals_ema.hrv_ema) / DB.vitals_ema.hrv_ema;
    const rhrDiff = (DB.vitals_ema.rhr_ema - rhr) / DB.vitals_ema.rhr_ema;
    let readiness = 80 + (hrvDiff * 50) + (rhrDiff * 50);
    
    const score_total = Math.min(totalMins / 480.0, 1.0);
    const score_deep = Math.min(deepMins / 90.0, 1.0);
    const score_rem = Math.min(remMins / 100.0, 1.0);
    const sleepMod = (score_total * 0.4) + (score_deep * 0.3) + (score_rem * 0.3);
    
    DB.current_hp = Math.max(0, Math.min(150, Math.round(readiness * sleepMod)));
    DB.current_buff = DB.current_hp >= 80 ? 1.2 : 1.0;
    
    DB.current_debuffs = [];
    if (score_deep >= 0.8 && score_rem <= 0.6) DB.current_debuffs.push('BRAIN_FOG');
    if (score_rem >= 0.8 && score_deep <= 0.6) DB.current_debuffs.push('MUSCLE_FATIGUE');

    const actionTime = window.selectedHeatmapDate || Date.now();
    const dMid = getMidnight(new Date(actionTime));
    DB.action_log = DB.action_log.filter(l => !(l.type === 'VITALS' && getMidnight(new Date(l.t)) === dMid));
    
    const sleepStr = `${th}h${tm}m|D:${dh}h${dm}m|R:${rh}h${rm}m`;
    DB.action_log.push({
        id: 'vitals_' + Date.now(),
        type: 'VITALS',
        hp: DB.current_hp,
        attrs: ['SYS'],
        xp: 0,
        desc: `状态同步 (Sleep:${sleepStr} HRV:${hrv} RHR:${rhr})`,
        t: actionTime
    });

    saveData(); renderVitalsUI(); renderHeatmap();
    logOracle(`> HP: ${DB.current_hp}% | BUFF: x${DB.current_buff.toFixed(1)}`);
}

// ===== 行为录入 (Inline) =====
function getActiveTagsInline(baseAttr) {
    const tags = [baseAttr];
    const container = document.getElementById(`inline-tags-${baseAttr}`);
    if (container) {
        container.querySelectorAll('.mini-tag.active').forEach(el => tags.push(el.getAttribute('data-attr')));
    }
    return tags;
}

function commitToxic() {
    const attrStats = calcLevelObj(DB.attributes.FOC.total_xp);
    const penalty = Math.floor(attrStats.xp_needed * 0.30);
    showConfirm(`系统违规确认 (多巴胺透支)：\n系统将直接扣除 FOC (专注) 当前升级所需经验的 30%（-${penalty} XP）。不可撤销。`, () => {
        DB.attributes.FOC.total_xp = Math.max(0, DB.attributes.FOC.total_xp - penalty);
        const actionTime = window.selectedHeatmapDate || Date.now();
        addActionLog('TOXIC', ['FOC'], -penalty, '前额叶损伤 (谷氨酸毒性)', actionTime);
        logOracle(`CRITICAL: 谷氨酸毒性。FOC -${penalty} XP`, 'negative');
        window.openInlinePanel = null;
        saveData(); renderHeatmap(); renderRadar();
    });
}

function commitInline(baseAttr) {
    const tags = getActiveTagsInline(baseAttr);
    const actionTime = window.selectedHeatmapDate || Date.now();
    const val = parseFloat(document.getElementById(`in-duration-${baseAttr}`).value);
    const intensity = Math.min(3.0, Math.max(0.1, parseFloat(document.getElementById(`in-intensity-${baseAttr}`).value) || 1.0));
    
    const chkTax = document.getElementById('chk-memory-tax');
    const hasTax = chkTax ? chkTax.checked : false;

    if (isNaN(val) || val <= 0) { logOracle('ERR: 请输入有效时长/次数。', 'negative'); return; }
    if (val > 1000) { logOracle('ERR: 单次录入过大(>1000)。', 'negative'); return; }

    let hybridMult = 1.0;
    if (tags.length === 2) hybridMult = 0.65; 
    else if (tags.length === 3) hybridMult = 0.50;
    else if (tags.length === 4) hybridMult = 0.40;

    let baseXp = val * 1.0;
    let totalMult = intensity * DB.current_buff * hybridMult;
    let taxFlags = [];
    if (hasTax) { totalMult *= 0.7; taxFlags.push('熵税'); }
    if (hybridMult < 1.0) taxFlags.push(`并发折损×${hybridMult.toFixed(2)}`);

    let finalXp = baseXp * totalMult;
    let levelUpMsg = "";
    
    tags.forEach(attr => {
        const oldLvl = calcLevelObj(DB.attributes[attr].total_xp).level;
        DB.attributes[attr].total_xp += finalXp;
        
        const medThreshold = oldLvl * 1.5;
        if (finalXp >= medThreshold) {
            DB.attributes[attr].last_update = Math.max(DB.attributes[attr].last_update || 0, actionTime);
        } else {
            taxFlags.push(`${attr} 未达MED(${medThreshold.toFixed(1)})`);
        }
        
        const newLvl = calcLevelObj(DB.attributes[attr].total_xp).level;
        if (newLvl > oldLvl) levelUpMsg += ` [${attr} -> LV.${newLvl}]`;
    });

    const desc = `${val} ${baseAttr==='WIL'?'数':'min'} × ${intensity.toFixed(1)}${taxFlags.length? ' ('+taxFlags.join(',')+')':''}`;
    addActionLog('COMMIT', tags, finalXp, desc, actionTime);
    
    logOracle(`> [${tags.join('+')}] +${Math.floor(finalXp)} XP. ${desc}`);
    if (levelUpMsg) logOracle(`>>> LEVEL UP!${levelUpMsg}`, 'positive');

    if (chkTax) chkTax.checked = false;
    window.openInlinePanel = null;
    saveData(); renderRadar(); renderHeatmap();
}

// ===== History System =====
function addActionLog(type, attrs, xp, desc, customTime = null) {
    const logId = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    const actionT = customTime || Date.now();
    DB.action_log.unshift({ id: logId, t: actionT, type, attrs, xp: Math.floor(xp), desc, revoked: false });
    
    // 按时间倒序重排 log
    DB.action_log.sort((a, b) => b.t - a.t);
    if (DB.action_log.length > 100) DB.action_log.pop();
}

function revokeAction(id) {
    const entry = DB.action_log.find(x => x.id === id);
    if (!entry || entry.revoked || entry.type === 'TOXIC') return;

    showConfirm(`确认撤销该记录并扣除 XP？`, () => {
        entry.attrs.forEach(attr => {
            DB.attributes[attr].total_xp = Math.max(0, DB.attributes[attr].total_xp - entry.xp);
        });
        entry.revoked = true;
        logOracle(`> SYS: 已撤销记录 [${entry.attrs.join('+')}] -${entry.xp} XP`, 'system');
        saveData(); renderHeatmap();
    });
}

// ===== 渲染层 =====
function renderVitalsUI() {
    const hpEl = document.getElementById('ui-hp-val');
    const statusEl = document.getElementById('ui-hp-status');
    const hpFill = document.getElementById('hp-fill');

    if (DB.current_hp === 0 && DB.vitals_ema.hrv_ema === null) {
        hpEl.innerText = '--%'; statusEl.style.display = 'none'; return;
    }
    hpEl.innerText = `${DB.current_hp}%`;
    if (hpFill) {
        hpFill.style.width = Math.max(0, Math.min(100, DB.current_hp)) + '%';
        hpFill.style.backgroundColor = DB.current_hp < 40 ? 'var(--orange)' : 'var(--green)';
        hpFill.style.boxShadow = DB.current_hp < 40 ? '0 0 8px rgba(230,81,0,0.4)' : '0 0 8px rgba(0,191,165,0.4)';
    }

    statusEl.style.display = 'inline-block'; statusEl.className = 'status-badge';
    let texts = [];
    if (DB.current_hp >= 80) texts.push('BUFF ×1.2');
    else if (DB.current_hp < 40) texts.push('⚠ 伤病高危');
    
    if (DB.current_debuffs) {
        if (DB.current_debuffs.includes('BRAIN_FOG')) texts.push('▼ 脑雾 (FOC-10%)');
        if (DB.current_debuffs.includes('MUSCLE_FATIGUE')) texts.push('▼ 肌肉疲劳 (STR-10%)');
    }
    
    if (texts.length > 0) {
        statusEl.innerText = texts.join(' | ');
        if (DB.current_hp >= 80 && texts.length === 1) statusEl.classList.add('status-buff');
        else statusEl.classList.add('status-warn');
    } else { 
        statusEl.style.display = 'none'; 
    }
}

window.openInlinePanel = null;

function toggleInlinePanel(key) {
    if (window.openInlinePanel === key) window.openInlinePanel = null;
    else window.openInlinePanel = key;
    renderRadar();
}

function getPresetsHtml(key) {
    let presets = INTENSITY_PRESETS.DEFAULT;
    if (key === 'WIL') presets = INTENSITY_PRESETS.WIL;
    else if (key === 'STR' || key === 'CON') presets = INTENSITY_PRESETS.STR_CON;
    else if (key === 'FOC') presets = INTENSITY_PRESETS.FOC;
    return presets.map(p => `<option value="${p.val}" ${p.default?'selected':''}>${p.text}</option>`).join('');
}

function renderRadar() {
    const container = document.getElementById('attributes-list');
    if (!container) return;
    container.innerHTML = '';
    const msPerDay = 86400000;
    const todayMid = getMidnight(new Date());

    Object.keys(ATTR_CONFIG).forEach(key => {
        const conf = ATTR_CONFIG[key];
        const attr = DB.attributes[key];
        const stats = calcLevelObj(attr.total_xp);
        const pct = Math.max(0, Math.min(100, stats.progress * 100));

        const updateMid = getMidnight(new Date(attr.last_update));
        const daysPassed = Math.floor((todayMid - updateMid) / msPerDay);
        const daysLeft = conf.safe_days - daysPassed;
        const actRate = getActualDecayRate(key, stats.level);

        let decayMsg, decayClass = 'attr-decay';
        if (conf.safe_days === 0) {
            decayMsg = daysPassed === 0 ? '今日已激活' : `突触退化: -${(actRate*100).toFixed(2)}%/天`;
            if (daysPassed > 0) decayClass += ' decaying';
        } else if (daysLeft > 0) {
            decayMsg = `保护期: ${daysLeft}天`;
        } else if (daysLeft === 0) {
            decayMsg = '⚠ 今日到期 (00:00 衰减)'; decayClass += ' decaying';
        } else {
            decayMsg = `突触退化: -${(actRate*100).toFixed(2)}%/天`; decayClass += ' decaying';
        }

        container.insertAdjacentHTML('beforeend', `
            <div class="attr-row">
                <div class="attr-header">
                    <div class="attr-name-group">
                        <span class="attr-name">${key}</span>
                        <span class="attr-label">${conf.name}</span>
                        <span class="attr-level">LV.${stats.level.toString().padStart(2, '0')}<span class="btn-add-xp" onclick="openManualInput('${key}')">+</span></span>
                    </div>
                    <span class="${decayClass}">${decayMsg}</span>
                </div>
                <div class="xp-bar-container">
                    <div class="progress-bg"><div class="progress-fill" style="width: ${pct}%"></div></div>
                    <span class="xp-text">${stats.xp_into_level} / ${stats.xp_needed}</span>
                    <span class="xp-total">Σ ${Math.floor(attr.total_xp)}</span>
                </div>
            </div>
        `);
    });
}


function renderHeatmap() {
    const grid = document.getElementById('calendar-grid');
    const label = document.getElementById('cal-month-label');
    const todayMid = getMidnight(new Date());
    
    let selectedDateMs = window.selectedHeatmapDate || todayMid;
    const sDate = new Date(selectedDateMs);
    document.getElementById('day-context-title').innerText = `/// I/O & MEMORY: ${sDate.getFullYear()}-${(sDate.getMonth()+1).toString().padStart(2,'0')}-${sDate.getDate().toString().padStart(2,'0')}`;
    
    const year = currentCalDate.getFullYear();
    const month = currentCalDate.getMonth();
    label.innerText = `${year} - ${(month+1).toString().padStart(2, '0')}`;
    
    grid.innerHTML = `
        <div class="calendar-day-header">SUN</div>
        <div class="calendar-day-header">MON</div>
        <div class="calendar-day-header">TUE</div>
        <div class="calendar-day-header">WED</div>
        <div class="calendar-day-header">THU</div>
        <div class="calendar-day-header">FRI</div>
        <div class="calendar-day-header">SAT</div>
    `;
    
    const firstDay = new Date(year, month, 1);
    const startOffset = firstDay.getDay(); 
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    const logsByDay = {};
    DB.action_log.forEach(log => {
        const d = new Date(log.t);
        const mid = getMidnight(d);
        if (!logsByDay[mid]) logsByDay[mid] = [];
        logsByDay[mid].push(log);
    });

    for (let i = 0; i < startOffset; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'calendar-cell empty';
        grid.appendChild(emptyCell);
    }
    
    for (let day = 1; day <= daysInMonth; day++) {
        const d = new Date(year, month, day);
        const dMid = getMidnight(d);
        const dayLogs = logsByDay[dMid] || [];
        
        let totalXpGain = 0;
        let totalXpLoss = 0;
        let dayHp = null;
        let hasToxic = false;
        
        dayLogs.forEach(l => {
            if (l.revoked) return;
            if (l.type === 'VITALS') {
                dayHp = l.hp;
            } else if (l.type === 'TOXIC') {
                hasToxic = true;
                totalXpLoss += Math.abs(l.xp);
            } else if (l.type === 'DECAY') {
                totalXpLoss += Math.abs(l.xp);
            } else {
                if (l.xp >= 0) totalXpGain += l.xp;
                else totalXpLoss += Math.abs(l.xp);
            }
        });

        const cell = document.createElement('div');
        cell.className = 'calendar-cell tip';
        
        let hpHtml = '';
        if (dayHp !== null) {
            let hpClass = dayHp >= 80 ? 'hp-high' : (dayHp < 40 ? 'hp-low' : 'hp-mid');
            hpHtml = `<div class="cell-hp ${hpClass}">${Math.floor(dayHp)}</div>`;
        }
        
        let xpGainStr = totalXpGain > 0 ? `<div class="xp-gain">+${Math.floor(totalXpGain)}</div>` : ``;
        let xpLossStr = totalXpLoss > 0 ? `<div class="xp-loss">-${Math.floor(totalXpLoss)}</div>` : ``;

        cell.innerHTML = `
            <div class="cell-header">
                <div class="cell-date">${day}</div>
                ${hpHtml}
            </div>
            <div class="cell-xp-row">
                ${xpGainStr}
                ${xpLossStr}
            </div>
        `;
        
        let levelClass = '';
        if (totalXpGain >= 100) levelClass = 'level-4';
        else if (totalXpGain >= 50) levelClass = 'level-3';
        else if (totalXpGain >= 20) levelClass = 'level-2';
        else if (totalXpGain > 0) levelClass = 'level-1';
        
        if (levelClass) cell.classList.add(levelClass);
        if (hasToxic) cell.classList.add('toxic');
        if (selectedDateMs === dMid) cell.classList.add('active');
        
        const dateStr = `${month+1}/${day}`;
        cell.setAttribute('data-tip', `${dateStr} : +${Math.floor(totalXpGain)} / -${Math.floor(totalXpLoss)} XP`);
        
        cell.onclick = () => {
            window.selectedHeatmapDate = dMid;
            renderHeatmap(); 
        };
        
        grid.appendChild(cell);
        
        if (selectedDateMs === dMid) {
            renderHeatmapDetail(dMid, dayLogs, dateStr, dMid === todayMid);
        }
    }
    
    if (new Date(selectedDateMs).getMonth() !== month || new Date(selectedDateMs).getFullYear() !== year) {
        const d = new Date(selectedDateMs);
        const dStr = `${d.getMonth()+1}/${d.getDate()}`;
        renderHeatmapDetail(selectedDateMs, logsByDay[selectedDateMs] || [], dStr, selectedDateMs === todayMid);
    }
}

function renderHeatmapDetail(dMid, logs, dateStr, isToday) {
    const detailBox = document.getElementById('heatmap-detail');
    detailBox.style.display = 'block';
    
    let titleHtml = `<span>[${dateStr}] 日志明细</span>`;
    if (isToday) titleHtml += ` <span style="color:var(--green); font-size:0.7rem;">(TODAY)</span>`;
    
    detailBox.innerHTML = `<div class="heatmap-detail-title">${titleHtml}</div>`;
    
    if (logs.length === 0) {
        detailBox.insertAdjacentHTML('beforeend', '<div style="color:var(--text-hint); padding: 5px 0;">[当日无数据 / 记忆空白]</div>');
        return;
    }
    
    const list = document.createElement('div');
    list.className = 'history-list';
    
    const sorted = [...logs].sort((a,b) => b.t - a.t);
    sorted.forEach((entry, idx) => {
        const d = new Date(entry.t);
        const timeStr = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        
        let xpStr = entry.xp > 0 ? `+${entry.xp}` : `${entry.xp}`;
        let xpClass = entry.xp < 0 ? 'hist-xp negative' : 'hist-xp';
        if (entry.revoked) { xpStr = '<s>REVOKED</s>'; xpClass = 'hist-xp negative'; }

        let btnHtml = '';
        if (!entry.revoked && entry.type !== 'TOXIC' && entry.type !== 'VITALS') {
            btnHtml = `<button class="btn-revoke" onclick="revokeAction('${entry.id}')">[撤销]</button>`;
        }

        list.insertAdjacentHTML('beforeend', `
            <div class="history-item" style="background: transparent; padding: 4px 0; border-bottom: 1px dashed var(--border);">
                <span class="hist-time" style="width: 50px;">${timeStr}</span>
                <span class="hist-attr">${(entry.attrs || []).join('+')}</span>
                <span class="${xpClass}">${xpStr}</span>
                <span class="hist-desc" title="${entry.desc}">${entry.desc}</span>
                ${btnHtml}
            </div>
        `);
    });
    detailBox.appendChild(list);
}

function renderHistory() {
    renderHeatmap();
    const list = document.getElementById('history-list');
    list.innerHTML = '';
    
    if (DB.action_log.length === 0) {
        list.innerHTML = '<div style="color:var(--text-hint); font-size:0.8rem;">[无存储记录]</div>';
        return;
    }

    DB.action_log.forEach((entry, idx) => {
        const d = new Date(entry.t);
        const timeStr = `${d.getMonth()+1}-${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        
        let xpStr = entry.xp > 0 ? `+${entry.xp}` : `${entry.xp}`;
        let xpClass = entry.xp < 0 ? 'hist-xp negative' : 'hist-xp';
        if (entry.revoked) { xpStr = '<s>REVOKED</s>'; xpClass = 'hist-xp negative'; }

        let btnHtml = '';
        // 允许撤回最近的 10 条（非 TOXIC 且未撤销）
        if (idx < 10 && !entry.revoked && entry.type !== 'TOXIC') {
            btnHtml = `<button class="btn-revoke" onclick="revokeAction('${entry.id}')">[撤销]</button>`;
        }

        list.insertAdjacentHTML('beforeend', `
            <div class="history-item">
                <span class="hist-time">${timeStr}</span>
                <span class="hist-attr">${entry.attrs.join('+')}</span>
                <span class="${xpClass}">${xpStr}</span>
                <span class="hist-desc" title="${entry.desc}">${entry.desc}</span>
                ${btnHtml}
            </div>
        `);
    });
}

function logOracle(msg, type = '') {
    const log = document.getElementById('oracle-log');
    const entry = document.createElement('div');
    entry.className = 'log-entry' + (type ? ` ${type}` : '');
    log.appendChild(entry);
    let i = 0;
    const writer = setInterval(() => {
        entry.textContent += msg.charAt(i);
        i++;
        if (i >= msg.length) { clearInterval(writer); log.scrollTop = log.scrollHeight; }
    }, 12);
}

// ===== Oracle API =====
async function callOracleAuto() {
    let text = document.getElementById('in-oracle-journal').value.trim();
    if (!text) text = "没有新的日志录入。请单纯基于我的历史数据给出一句锐评或建议。";
    
    const { api_url, api_key, model_id } = DB.settings;
    if (!api_key) { logOracle('SYS: 先知离线。请在配置填入 API Key。', 'negative'); return; }

    const btn = document.getElementById('btn-oracle-auto');
    btn.disabled = true;
    logOracle('> NEURAL LINK CONNECTING...', 'system');

    const now = Date.now();
    const d7 = now - 7 * 86400000;
    const logs7d = DB.action_log.filter(l => l.t > d7);
    let xp7d = { STR:0, CON:0, FOC:0, WIL:0 };
    let hpSum = 0, hpCount = 0;
    logs7d.forEach(l => {
        if(l.type === 'XP' && !l.revoked) l.attrs.forEach(a => { if(xp7d[a]!==undefined) xp7d[a] += l.xp; });
        if(l.type === 'VITALS') { hpSum += l.hp; hpCount++; }
    });
    const avgHp = hpCount > 0 ? Math.round(hpSum/hpCount) : DB.current_hp;
    const ctx = `7D:STR+${Math.round(xp7d.STR)} CON+${Math.round(xp7d.CON)} FOC+${Math.round(xp7d.FOC)} WIL+${Math.round(xp7d.WIL)} HP:${avgHp}`;

    const prompt = `你是RPG引擎AI。提取用户日志中的体征与行为。按严格JSON输出：
{"eval":"赛博朋克风点评(<50字),结合历史:${ctx}","actions":[{"type":"VITALS","th":总时,"tm":分,"dh":深睡时,"dm":深睡分,"rh":REM时,"rm":REM分,"hrv":数值,"rhr":数值},{"type":"XP","attrs":["STR"|"CON"|"FOC"|"WIL"],"duration":时长,"intensity":乘数(0.8-3.0),"desc":"简述"}]}
缺失数据用0。用户日志：${text}`;

    try {
        const res = await fetch(api_url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${api_key}` },
            body: JSON.stringify({ 
                model: model_id, 
                messages: [{ role: 'user', content: prompt }], 
                response_format: { type: "json_object" }
            })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        
        const content = data.choices[0].message.content.trim();
        const match = content.match(/\{[\s\S]*\}/);
        if(!match) throw new Error("JSON parse error");
        let result = JSON.parse(match[0]);
        
        logOracle(`[ORACLE]: ${result.eval}`, 'positive');
        
        if (result.actions && result.actions.length > 0) {
            let hasSTR = false, hasCON = false;
            result.actions.forEach(act => {
                if (act.type === 'XP' && act.attrs) {
                    if (act.attrs.includes('STR')) hasSTR = true;
                    if (act.attrs.includes('CON')) hasCON = true;
                }
            });
            const interference = hasSTR && hasCON;

            result.actions.forEach(act => {
                if (act.type === 'VITALS') {
                    if(act.th) document.getElementById('slp-t-h').value = act.th;
                    if(act.tm) document.getElementById('slp-t-m').value = act.tm;
                    if(act.dh) document.getElementById('slp-d-h').value = act.dh;
                    if(act.dm) document.getElementById('slp-d-m').value = act.dm;
                    if(act.rh) document.getElementById('slp-r-h').value = act.rh;
                    if(act.rm) document.getElementById('slp-r-m').value = act.rm;
                    if(act.hrv) document.getElementById('in-hrv').value = act.hrv;
                    if(act.rhr) document.getElementById('in-rhr').value = act.rhr;
                    syncVitals();
                } else if (act.type === 'XP') {
                    const duration = parseFloat(act.duration) || 0;
                    const intensity = parseFloat(act.intensity) || 1.0;
                    const xpAmount = Math.round(duration * intensity * DB.current_buff);
                    if (xpAmount <= 0 || !act.attrs || act.attrs.length === 0) return;
                    
                    const actionTime = window.selectedHeatmapDate || Date.now();
                    act.attrs.forEach(attr => {
                        if (DB.attributes[attr]) {
                            let finalXp = xpAmount;
                            let tags = [];
                            if (attr === 'STR' && interference) {
                                finalXp = Math.round(finalXp * 0.85);
                                tags.push('[拮抗 -15%]');
                            }
                            if (DB.current_debuffs && DB.current_debuffs.includes('BRAIN_FOG') && attr === 'FOC') {
                                finalXp = Math.round(finalXp * 0.90);
                                tags.push('[脑雾 -10%]');
                            }
                            if (DB.current_debuffs && DB.current_debuffs.includes('MUSCLE_FATIGUE') && attr === 'STR') {
                                finalXp = Math.round(finalXp * 0.90);
                                tags.push('[疲劳 -10%]');
                            }
                            
                            DB.attributes[attr].total_xp += finalXp;
                            DB.attributes[attr].last_update = Date.now();
                            
                            const tagStr = tags.length > 0 ? ' ' + tags.join(' ') : '';
                            DB.action_log.push({
                                id: 'act_' + Date.now() + Math.floor(Math.random()*1000),
                                type: 'XP',
                                attrs: [attr],
                                xp: finalXp,
                                desc: `[AUTO] ${act.desc || 'AI_UPLOAD'}${tagStr}`,
                                t: actionTime
                            });
                            logOracle(`> AUTO_EXEC: ${attr} +${finalXp}XP${tagStr}`, 'system');
                        }
                    });
                }
            });
            saveData();
            renderRadar();
            renderHeatmap();
            document.getElementById('in-oracle-journal').value = '';
        }
    } catch (e) {
        logOracle(`ERR: 解析失败 (${e.message})`, 'negative');
    } finally { btn.disabled = false; }
}

function getMidnight(date) { return new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime(); }

function showConfirm(msg, onYes) {
    const overlay = document.getElementById('confirm-overlay');
    document.getElementById('confirm-msg').innerText = msg;
    overlay.classList.add('active');
    const cleanup = () => { overlay.classList.remove('active'); document.getElementById('confirm-yes').replaceWith(document.getElementById('confirm-yes').cloneNode(true)); document.getElementById('confirm-no').replaceWith(document.getElementById('confirm-no').cloneNode(true)); };
    document.getElementById('confirm-yes').addEventListener('click', () => { cleanup(); onYes(); }, { once: true });
    document.getElementById('confirm-no').addEventListener('click', () => { cleanup(); }, { once: true });
}

function setupEventListeners() {
    if (window._listenersAttached) return;
    window._listenersAttached = true;
    
    document.getElementById('btn-sync-vitals').addEventListener('click', syncVitals);
    document.getElementById('btn-oracle-auto').addEventListener('click', callOracleAuto);


    // Settings
    document.getElementById('btn-toggle-settings').addEventListener('click', () => {
        const sec = document.getElementById('settings-section');
        if (sec.style.display !== 'block') {
            sec.style.display = 'block';
            if (!DB.settings) DB.settings = { api_url: '', api_key: '', model_id: '' };
            document.getElementById('in-api-url').value = DB.settings.api_url || '';
            document.getElementById('in-api-key').value = DB.settings.api_key || '';
            document.getElementById('in-model-id').value = DB.settings.model_id || '';
            sec.scrollIntoView({ behavior: 'smooth' });
        } else { 
            sec.style.display = 'none'; 
        }
    });
    document.getElementById('btn-save-settings').addEventListener('click', () => {
        DB.settings.api_url = document.getElementById('in-api-url').value.trim() || DEFAULT_SETTINGS.api_url;
        DB.settings.api_key = document.getElementById('in-api-key').value.trim();
        DB.settings.model_id = document.getElementById('in-model-id').value.trim() || DEFAULT_SETTINGS.model_id;
        saveData(); document.getElementById('settings-section').style.display = 'none';
        logOracle('> AI 配置已保存。', 'system');
    });

    // IO
    document.getElementById('btn-export').addEventListener('click', () => {
        const exp = { ...DB };
        if (exp.settings && exp.settings.api_key) exp.settings.api_key = exp.settings.api_key.length > 8 ? exp.settings.api_key.slice(0,4)+'****'+exp.settings.api_key.slice(-4) : '****';
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(exp, null, 2)], { type: 'application/json' }));
        a.download = `ProjectFlesh_V5.1_${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
    });
    document.getElementById('btn-import').addEventListener('click', () => document.getElementById('file-import').click());
    document.getElementById('file-import').addEventListener('change', (e) => {
        const file = e.target.files[0]; if (!file) return;
        showConfirm(`确认导入「${file.name}」覆盖当前数据？`, () => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imp = JSON.parse(ev.target.result);
                    if (!imp.attributes) throw new Error("无机能数据");
                    if (imp.settings?.api_key?.includes('****')) imp.settings.api_key = DB.settings.api_key;
                    DB = imp; saveData(); bootUI();
                    logOracle('> 数据导入完成。状态重载。', 'system');
                } catch (err) { logOracle('ERR: JSON 解析失败', 'negative'); }
            };
            reader.readAsText(file);
        });
        e.target.value = '';
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
        showConfirm('确认清除当前所有数据并重新校准坐标？此操作不可逆。', () => {
            // 保险措施：可选自动备份当前数据
            if (DB && DB.profile) {
                if (confirm("是否需要在重置前，下载一份当前数据的备份文件以防万一？")) {
                    const exp = { ...DB };
                    if (exp.settings && exp.settings.api_key) exp.settings.api_key = exp.settings.api_key.length > 8 ? exp.settings.api_key.slice(0,4)+'****'+exp.settings.api_key.slice(-4) : '****';
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(new Blob([JSON.stringify(exp, null, 2)], { type: 'application/json' }));
                    a.download = `ProjectFlesh_AutoBackup_${new Date().toISOString().slice(0, 10)}.json`;
                    a.click();
                }
            }

            // 重置界面：清空所有数值输入框、文本框和多选框
            document.querySelectorAll('input[type="number"], textarea').forEach(el => el.value = '');
            document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
            // 清空系统日志
            document.getElementById('oracle-log').innerHTML = '<div>> SYS_INIT COMPLETE. ENGINE V5 ONLINE.</div>';

            DB = createFreshDB(); 
            saveData(); 
            showCalibration();
        });
    });
}
